name: Update Users Time

on:
  schedule:

    - cron: "* * * * *"   # 
  workflow_dispatch:       # 
    - cron: "* * * * *"   # cada minuto
  workflow_dispatch:       # para ejecutarlo manual también

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repo
        uses: actions/checkout@v3

      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Ejecutar script
        run: node update.js

      - name: Commit y push
        run: |
          git config user.name "auto-bot"
          git config user.email "bot@users.noreply.github.com"

          git add users.txt
          
          git commit -m "⏱️ update timers" || echo "no changes"

          git push
