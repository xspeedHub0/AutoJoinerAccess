name: Update Users Time

on:
  schedule:
    - cron: "*/2 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Run script
        run: node update.js

      - name: Commit changes
        run: |
          git config user.name "auto-bot"
          git config user.email "bot@users.noreply.github.com"
          git add users.txt
          git commit -m "update timers" || echo "no changes"
          git push
